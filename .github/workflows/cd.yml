name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # QEMU 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Docker 이미지 빌드 및 Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 빌드할 플랫폼을 'linux/arm64'로 지정
          platforms: linux/arm64
          # Docker Hub에 바로 푸시
          push: true
          # 이미지 태그 지정
          tags: ${{ secrets.DOCKER_USERNAME }}/taja:latest

      # 4. docker-compose.yml 서버에 복사
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.RPI_HOST }}
          username: ${{ secrets.RPI_USER }}
          key: ${{ secrets.RPI_SSH_KEY }}
          port: ${{ secrets.RPI_SSH_PORT }}
          source: "docker-compose.yml,nginx/default.conf,init-letsencrypt.sh"
          target: "~/taja"

      # 5. 라즈베리파이에 배포
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RPI_HOST }}
          username: ${{ secrets.RPI_USER }}
          key: ${{ secrets.RPI_SSH_KEY }}
          port: ${{ secrets.RPI_SSH_PORT }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            cd ~/taja

            # 1) .env 파일 생성
            cat > .env <<EOF
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/taja:latest
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            BIKE_API_KEY=${{ secrets.BIKE_API_KEY }}
            BIKE_API_BASE_URL=${{ secrets.BIKE_API_BASE_URL }}
            BIKE_STATUS_API_PATH=${{ secrets.BIKE_STATUS_API_PATH }}
            BIKE_STATION_API_PATH=${{ secrets.BIKE_STATION_API_PATH }}
            WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}
            WEATHER_API_BASE_URL=${{ secrets.WEATHER_API_BASE_URL }}
            EMAIL_USER_NAME=${{ secrets.EMAIL_USER_NAME }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CERTBOT_EMAIL=${{ secrets.CERTBOT_EMAIL }}
            EOF

            # 2) 기존 단독 컨테이너 정리 (최초 1회)
            docker stop taja || true
            docker rm taja || true

            # 3) docker compose로 배포
            docker compose pull app
            docker compose up -d
